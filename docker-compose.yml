services:
  loreum-postgres:
    image: postgres:18-alpine
    container_name: loreum-postgres${CONTAINER_SUFFIX:-}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - loreum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loreum-redis:
    image: redis:7-alpine
    container_name: loreum-redis${CONTAINER_SUFFIX:-}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - loreum-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    restart: unless-stopped

  loreum-opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: loreum-opensearch${CONTAINER_SUFFIX:-}
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: ${OPENSEARCH_DISABLE_SECURITY:-false}
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD:-}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${OPENSEARCH_PORT:-19200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - loreum-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  loreum-mcp:
    profiles: ["mcp"]
    image: dcr.svc.dziurzynscy.com/loreum-mcp:${LOREUM_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    container_name: loreum-mcp${CONTAINER_SUFFIX:-}
    environment:
      NODE_ENV: production
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3022
      MCP_API_BASE_URL: ${MCP_API_BASE_URL:-http://host.docker.internal:3021/v1}
      MCP_API_TOKEN: ${MCP_API_TOKEN:?MCP_API_TOKEN is required}
      MCP_HTTP_AUTH_TOKEN: ${MCP_HTTP_AUTH_TOKEN:?MCP_HTTP_AUTH_TOKEN is required}
      MCP_READ_ONLY: ${MCP_READ_ONLY:-true}
      MCP_ENABLE_WRITES: ${MCP_ENABLE_WRITES:-false}
      MCP_ALLOW_ALL_WRITE_TOOLS: ${MCP_ALLOW_ALL_WRITE_TOOLS:-false}
      MCP_WRITE_TOOLS: ${MCP_WRITE_TOOLS:-}
    ports:
      - "${MCP_BIND_ADDR:-127.0.0.1}:${MCP_HTTP_PORT:-3022}:3022"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - loreum-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3022/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  opensearch_data:

networks:
  loreum-network:
    name: loreum-network${CONTAINER_SUFFIX:-}
    driver: bridge
